name: Daily Panchanga Audio Sync

on:
  schedule:
    - cron: '30 0 * * *'  # 6:00 AM IST (UTC+5:30)
  workflow_dispatch:      # <--- MANUAL TRIGGER
    inputs:
      custom_text:
        description: 'Override Sanskrit text (Optional)'
        required: false
        default: ''
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}'
          token_format: 'access_token'
          create_credentials_file: true

      - name: Run sync script
        env:
          GOOGLE_APPLICATION_CREDENTIALS: '${{ steps.auth.outputs.credentials_file_path }}'
          GOOGLE_ACCESS_TOKEN: '${{ steps.auth.outputs.access_token }}'
        run: node sync-script.js

      - name: Upload Audio Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-panchanga-audio
          path: |
            output.wav
            output_final.wav
