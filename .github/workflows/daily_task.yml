name: Daily Audio Sync
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # <--- This automatically caches your npm dependencies

      - name: Install dependencies
        run: npm install

      - name: Execute Sync Script
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node sync-script.js
