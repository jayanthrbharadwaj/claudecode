name: Daily Audio Sync
on:
  schedule:
    - cron: '0 4 * * *' # Runs at 4:00 AM UTC
  workflow_dispatch: # Allows manual testing

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install firebase-admin axios

      - name: Execute Sync Script
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node sync-script.js
