name: Daily Audio Sync
on:
  schedule:
    - cron: '30 0 * * *'  # 6:00 AM IST (UTC+5:30)
  workflow_dispatch:      # <--- MANUAL TRIGGER
    inputs:
      custom_text:
        description: 'Override Sanskrit text (Optional)'
        required: false
        default: ''

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # This will install Sanscript, Axios, etc., from your package.json
        run: npm install

      - name: Execute Sync Script
        run: node sync-script.js
      - name: Upload Cropped Audio and Metadata
        uses: actions/upload-artifact@v4
        with:
          name: panchanga-artifacts
          path: |
            panchanga_trimmed_*.wav
            panchanga_metadata_*.json
  
